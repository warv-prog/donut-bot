<!DOCTYPE html>
<html>
<head>
  <title>Bot Panel</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; }
    .container { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }
    .sidebar { background: #161b22; border-right: 1px solid #30363d; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .main { display: flex; flex-direction: column; }
    .header { background: #238636; padding: 16px 20px; font-weight: 600; font-size: 14px; }
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    input, select, textarea { width: 100%; padding: 8px; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 6px; font-family: inherit; font-size: 12px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #58a6ff; }
    button { width: 100%; padding: 8px; background: #238636; color: white; border: none; border-radius: 6px; font-weight: 600; font-size: 12px; cursor: pointer; }
    button:hover { background: #2ea043; }
    button.danger { background: #da3633; }
    button.danger:hover { background: #f85149; }
    button.secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
    button.secondary:hover { background: #30363d; }
    .section { border-bottom: 1px solid #30363d; padding-bottom: 12px; }
    .section-title { font-size: 11px; text-transform: uppercase; color: #8b949e; font-weight: 600; margin-bottom: 8px; }
    .form-group { margin-bottom: 8px; }
    label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 4px; color: #8b949e; }
    .bot-list { flex: 1; overflow-y: auto; border-top: 1px solid #30363d; padding-top: 12px; }
    .bot-item { padding: 8px; background: #0d1117; border-left: 3px solid #30363d; margin-bottom: 6px; cursor: pointer; border-radius: 4px; font-size: 12px; }
    .bot-item:hover { background: #161b22; }
    .bot-item.active { background: #238636; border-left-color: #58a6ff; }
    .bot-item-name { font-weight: 600; }
    .bot-item-info { font-size: 11px; color: #8b949e; margin-top: 2px; }
    .terminal { flex: 1; background: #0d1117; padding: 16px; overflow-y: auto; font-family: 'SF Mono', Monaco, monospace; font-size: 11px; line-height: 1.6; }
    .line { margin: 2px 0; white-space: pre-wrap; word-break: break-all; }
    .line.error { color: #f85149; }
    .line.success { color: #3fb950; }
    .line.info { color: #58a6ff; }
    .action-bar { display: flex; gap: 8px; padding: 16px; border-bottom: 1px solid #30363d; background: #161b22; }
    .action-bar button { flex: 1; }
    .empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #8b949e; }
    .file-upload { cursor: pointer; }
    .file-upload:hover { background: #2ea043; }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div style="font-weight: 600; font-size: 14px;">🤖 Bot Panel</div>
      
      <div class="section">
        <div class="section-title">📤 Upload Credentials</div>
        <div class="form-group">
          <input type="file" id="credFile" accept=".txt" />
        </div>
        <button onclick="uploadCreds()" class="file-upload">Load .txt File</button>
        <p style="font-size: 11px; color: #8b949e; margin-top: 6px;">Format: email:password (one per line)</p>
      </div>

      <div class="section">
        <div class="section-title">➕ New Bot</div>
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="botName" placeholder="My Bot" />
        </div>
        <div class="form-group">
          <label>Server</label>
          <input type="text" id="botHost" placeholder="donutsmp.net" />
        </div>
        <div class="form-group">
          <label>Port</label>
          <input type="number" id="botPort" value="25565" />
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="botUsername" placeholder="Bot" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="botEmail" placeholder="email@microsoft.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="botPassword" placeholder="password" />
        </div>
        <div class="form-group">
          <label>Version</label>
          <select id="botVersion">
            <option value="1.20.4">1.20.4</option>
            <option value="1.21">1.21</option>
            <option value="1.21.1">1.21.1</option>
            <option value="latest">Latest</option>
          </select>
        </div>
        <button onclick="createBot()">Create Bot</button>
      </div>

      <div class="bot-list" id="botList"></div>
    </div>

    <div class="main">
      <div class="header" id="title">Bot Panel</div>
      <div class="content">
        <div id="empty" class="empty">Select a bot</div>
        <div id="botView" style="display: none; flex: 1; display: flex; flex-direction: column;">
          <div class="action-bar">
            <button id="startBtn" onclick="startBot()">▶ Start</button>
            <button id="stopBtn" class="secondary" onclick="stopBot()">⏹ Stop</button>
            <button id="delBtn" class="danger" onclick="deleteBot()">🗑 Delete</button>
          </div>
          <div class="terminal" id="terminal"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentBot = null;
    let ws = null;

    function connectWS() {
      ws = new WebSocket(`ws://${location.host}`);
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.line) addLine(data.line);
      };
      ws.onclose = () => setTimeout(connectWS, 2000);
    }
    connectWS();

    function addLine(text) {
      const term = document.getElementById('terminal');
      const line = document.createElement('div');
      line.className = 'line';
      if (text.includes('[ERROR]') || text.includes('[ERR]')) line.className += ' error';
      if (text.includes('[LOGIN]') || text.includes('[SPAWN]')) line.className += ' success';
      if (text.includes('[INFO]')) line.className += ' info';
      line.textContent = text;
      term.appendChild(line);
      term.scrollTop = term.scrollHeight;
    }

    function uploadCreds() {
      const file = document.getElementById('credFile').files[0];
      if (!file) return alert('Select file');
      const reader = new FileReader();
      reader.onload = (e) => {
        const lines = e.target.result.split('\n').filter(l => l.includes(':'));
        lines.forEach(line => {
          const [email, password] = line.trim().split(':');
          if (email && password) {
            document.getElementById('botEmail').value = email;
            document.getElementById('botPassword').value = password;
          }
        });
      };
      reader.readAsText(file);
    }

    async function createBot() {
      const name = document.getElementById('botName').value;
      const host = document.getElementById('botHost').value;
      const port = document.getElementById('botPort').value;
      const username = document.getElementById('botUsername').value;
      const email = document.getElementById('botEmail').value;
      const password = document.getElementById('botPassword').value;
      const version = document.getElementById('botVersion').value;

      if (!name || !host || !username || !email || !password) {
        return alert('Fill all fields');
      }

      const res = await fetch('/api/bots', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, host, port, username, email, password, version })
      }).then(r => r.json());

      if (res.success) {
        document.getElementById('botName').value = '';
        document.getElementById('botHost').value = '';
        document.getElementById('botUsername').value = '';
        document.getElementById('botEmail').value = '';
        document.getElementById('botPassword').value = '';
        loadBots();
      }
    }

    async function loadBots() {
      const bots = await fetch('/api/bots').then(r => r.json());
      const list = document.getElementById('botList');
      list.innerHTML = '';
      bots.forEach(bot => {
        const item = document.createElement('div');
        item.className = 'bot-item' + (bot.id === currentBot ? ' active' : '');
        item.onclick = () => selectBot(bot.id);
        item.innerHTML = `
          <div class="bot-item-name">${bot.name}</div>
          <div class="bot-item-info">${bot.username} @ ${bot.host}</div>
          <div class="bot-item-info" style="color: ${bot.running ? '#3fb950' : '#8b949e'}">● ${bot.running ? 'Running' : 'Stopped'}</div>
        `;
        list.appendChild(item);
      });
    }

    async function selectBot(id) {
      currentBot = id;
      document.getElementById('empty').style.display = 'none';
      document.getElementById('botView').style.display = 'flex';
      document.getElementById('terminal').innerHTML = '';
      document.getElementById('title').textContent = `Bot #${id}`;
      if (ws && ws.readyState === 1) ws.send(JSON.stringify({ action: 'watch', id }));
      loadBots();
    }

    async function startBot() {
      if (!currentBot) return;
      await fetch(`/api/bots/${currentBot}/start`, { method: 'POST' });
      loadBots();
    }

    async function stopBot() {
      if (!currentBot) return;
      await fetch(`/api/bots/${currentBot}/stop`, { method: 'POST' });
      loadBots();
    }

    async function deleteBot() {
      if (!currentBot || !confirm('Delete bot?')) return;
      await fetch(`/api/bots/${currentBot}`, { method: 'DELETE' });
      currentBot = null;
      document.getElementById('empty').style.display = 'flex';
      document.getElementById('botView').style.display = 'none';
      loadBots();
    }

    loadBots();
    setInterval(loadBots, 1000);
  </script>
</body>
</html>
