<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Bot Control Panel</title>
  <link rel="stylesheet" href="https://unpkg.com/xterm/css/xterm.css" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h2 style="color: #4fc3f7; margin-bottom: 10px;">🤖 Bots</h2>

      <div class="bot-list" id="botList"></div>

      <div class="section-title">New Bot</div>

      <div class="form-group">
        <label>Bot Name</label>
        <input type="text" id="botName" placeholder="Bot 1">
      </div>

      <div class="form-group">
        <label>Server Host</label>
        <input type="text" id="botHost" placeholder="donut-smp.com">
      </div>

      <div class="form-group">
        <label>Port</label>
        <input type="number" id="botPort" value="25565">
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="botUsername" placeholder="BotName">
      </div>

      <div class="form-group">
        <label>Access Token</label>
        <input type="password" id="botToken" placeholder="Mojang token">
      </div>

      <div class="form-group">
        <label>Client Token</label>
        <input type="text" id="botClientToken" placeholder="UUID">
      </div>

      <div class="form-group">
        <label>Version</label>
        <select id="botVersion">
          <option value="1.20.4">1.20.4</option>
          <option value="1.21" selected>1.21</option>
          <option value="1.21.1">1.21.1</option>
          <option value="1.21.3">1.21.3</option>
        </select>
      </div>

      <button onclick="createBot()">Create Bot</button>
    </div>

    <div class="main">
      <div class="header" id="mainHeader">📺 Select a bot to view terminal</div>
      <div class="content" id="content">
        <div class="empty-state">Select a bot from the list →</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/xterm/lib/xterm.js"></script>
  <script src="https://unpkg.com/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
